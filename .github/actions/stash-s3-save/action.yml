---
# FORK / CodeBuild-runner test only. Self-owned, S3-backed drop-in for
# apache/infrastructure-actions/stash/save. See stash-s3-restore for rationale.
#
# `path` may be a file, directory, or glob; matching entries are archived with
# `tar -P` (absolute and workspace-relative paths preserved) and uploaded to
# s3://<bucket>/<key>.tar.gz. `retention-days` is accepted for compatibility but
# ignored — set an S3 lifecycle rule on the bucket for expiry instead.
name: 'Save stash to S3'
description: 'S3-backed drop-in for stash/save (CodeBuild fork test).'
inputs:
  key:
    description: 'Stash key; used as the S3 object name (slashes allowed).'
    required: true
  path:
    description: 'File, directory, or glob to archive and upload.'
    required: true
  bucket:
    description: 'S3 bucket to store the stash in.'
    required: false
    default: 'airflow-ci-runner-cache'
  if-no-files-found:
    description: "'error' to fail when path matches nothing, otherwise 'warn'."
    required: false
    default: 'warn'
  retention-days:
    description: 'Compatibility only — ignored (use an S3 lifecycle rule).'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        STASH_KEY: ${{ inputs.key }}
        STASH_PATH: ${{ inputs.path }}
        STASH_BUCKET: ${{ inputs.bucket }}
        IF_NO_FILES_FOUND: ${{ inputs.if-no-files-found }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        # Expand globs in the path, then keep only entries that actually exist.
        # shellcheck disable=SC2206
        candidates=( ${STASH_PATH} )
        existing=()
        for p in "${candidates[@]}"; do
          if [ -e "${p}" ]; then
            existing+=( "${p}" )
          fi
        done
        if [ ${#existing[@]} -eq 0 ]; then
          if [ "${IF_NO_FILES_FOUND}" = "error" ]; then
            echo "::error::No files found for path '${STASH_PATH}'"
            exit 1
          fi
          echo "::warning::No files found for path '${STASH_PATH}' — skipping save"
          exit 0
        fi
        payload="${RUNNER_TEMP:-/tmp}/stash-save-$$.tar.gz"
        tar -cPzf "${payload}" "${existing[@]}"
        aws s3 cp --only-show-errors "${payload}" "s3://${STASH_BUCKET}/${STASH_KEY}.tar.gz"
        rm -f "${payload}"
        echo "✅ Saved stash '${STASH_KEY}' (${existing[*]}) to s3://${STASH_BUCKET}"
