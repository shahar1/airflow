---
name: 'Setup Breeze'
description: 'Sets up Python and Breeze'
inputs:
  python-version:
    description: 'Python version to use'
    default: "3.10"
outputs:
  host-python-version:
    description: Python version used in host
    value: ${{ steps.host-python-version.outputs.host-python-version }}
runs:
  using: "composite"
  steps:
    - name: "Setup python"
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: "Install uv"
      shell: bash
      # Extract uv version from uv.lock. The format is stable: the line
      # immediately after `name = "uv"` is `version = "<X.Y.Z>"`.
      run: |
        UV_VERSION=$(sed -n '/^name = "uv"$/{n;s/^version = "\(.*\)"$/\1/p;}' uv.lock)
        if [[ -z "${UV_VERSION}" ]]; then
          echo "Failed to extract uv version from uv.lock" >&2
          exit 1
        fi
        echo "Installing uv==${UV_VERSION}"
        pip install "uv==${UV_VERSION}"
    # NOTE! Installing Breeze without using cache is FASTER than when using cache - uv is so fast and has
    # so low overhead, that just running upload cache/restore cache is slower than installing it from scratch
    - name: "Install Breeze"
      shell: bash
      run: ./scripts/ci/install_breeze.sh
      env:
        PYTHON_VERSION: "${{ inputs.python-version }}"
    # FORK / CodeBuild-runner test: `breeze ci free-space` runs
    # `docker system prune --all --force --volumes`, which on the CodeBuild
    # Docker-in-Docker daemon leaves /var/lib/docker/tmp broken and makes the
    # next `docker pull` fail (`open /var/lib/docker/tmp/GetImageBlob...: no such
    # file or directory`), so the upstream step stays disabled here. But the
    # provider-distributions Compat install (~100 wheels + apache-airflow) does
    # exhaust the root volume (`No space left on device`), so reclaim space the
    # CodeBuild-safe way: clear the uv cache and prune docker BUILD CACHE ONLY
    # (no `--volumes`/`--all`, which is what broke DinD above). Re-enable the
    # upstream `breeze ci free-space` before merging upstream.
    # - name: "Free space"
    #   shell: bash
    #   run: breeze ci free-space
    #   env:
    #     AIRFLOW_ROOT_PATH: "${{ github.workspace }}"
    - name: "Free space (CodeBuild-safe)"
      shell: bash
      run: |
        # Guard in-shell on the runner's OS env var: the GHA `env` context does not
        # expose CodeBuild's CODEBUILD_BUILD_ID (it is not workflow-defined), so this
        # mirrors scripts/ci/make_mnt_writeable.sh / move_docker_to_mnt.sh.
        if [[ -n "${CODEBUILD_BUILD_ID:-}" ]]; then
          uv cache clean || true
          docker builder prune --all --force || true
        fi
    - name: "Get Python version"
      shell: bash
      run: >
        echo "host-python-version=$(python -c 'import platform; print(platform.python_version())')"
        >> ${GITHUB_OUTPUT}
      id: host-python-version
    - name: "Disable cheatsheet"
      shell: bash
      run: breeze setup config --no-cheatsheet --no-asciiart
      env:
        AIRFLOW_ROOT_PATH: "${{ github.workspace }}"
